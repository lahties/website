<nav class="navbar">
    <div class="container nav-container">
        <a href="{{ '/' | relative_url }}" class="logo">
            <img src="{{ 'assets/images/small-logo.svg' | relative_url }}" alt="LahtiES Logo" class="logo-img">
        </a>
        <ul class="nav-links">
            {% for item in site.data.navigation.main %}
            <li><a href="{{ item.url | relative_url }}" {% if page.url == item.url %}style="color: var(--text-primary);"{% endif %}>{{ item.title }}</a></li>
            {% endfor %}
            {% if site.data.navigation.cta %}
            <li><a href="{{ site.data.navigation.cta.url | relative_url }}" class="btn-primary">{{ site.data.navigation.cta.title }}</a></li>
            {% endif %}
        </ul>
        <div class="hamburger">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </div>
</nav>
