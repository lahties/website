# Use DecapBridge PKCE auth (required)
backend:
  name: git-gateway
  repo: lahties/website
  branch: main
  auth_type: pkce
  base_url: https://auth.decapbridge.com
  auth_endpoint: /sites/e0cc2737-c4f0-4aef-a2c0-058b314fbf10/pkce
  auth_token_endpoint: /sites/e0cc2737-c4f0-4aef-a2c0-058b314fbf10/token
  gateway_url: https://gateway.decapbridge.com

  # See who did what (optional)
  commit_messages:
    create: Create {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    update: Update {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    delete: Delete {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    uploadMedia: Upload “{{path}}” - {{author-name}} <{{author-login}}> via DecapBridge
    deleteMedia: Delete “{{path}}” - {{author-name}} <{{author-login}}> via DecapBridge
    openAuthoring: Message {{message}} - {{author-name}} <{{author-login}}> via DecapBridge

# Enable PKCE fields (optional, recommended)
auth:
  email_claim: email
  first_name_claim: first_name
  last_name_claim: last_name
  avatar_url_claim: avatar_url

# Better Decap + Bridge logo (optional)
logo_url: https://lahties.github.io/website/assets/images/logo.png

# Add site links in Decap CMS (optional)
site_url: https://lahties.github.io/website

media_folder: "assets/images"
public_folder: "/assets/images"

collections:
  - name: "pages"
    label: "Pages"
    folder: "pages"
    create: true
    extension: "html"
    format: "frontmatter"
    fields:
      - {label: "Layout", name: "layout", widget: "hidden", default: "page"}
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Permalink", name: "permalink", widget: "string", required: false}
      - {label: "Hero Visible", name: "hero_visible", widget: "boolean", default: true, required: false}
      - {label: "Aurora Animation", name: "aurora", widget: "boolean", default: true, required: false}
      - {label: "Hero Content", name: "hero_content", widget: "markdown", required: false}
      - {label: "Body", name: "body", widget: "markdown"}

  - name: "posts"
    label: "Posts"
    folder: "_posts"
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    create: true
    fields:
      - {label: "Layout", name: "layout", widget: "hidden", default: "post"}
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Date", name: "date", widget: "datetime"}
      - {label: "Cover Image", name: "cover_image", widget: "image", required: false}
      - {label: "Body", name: "body", widget: "markdown"}

  - name: "settings"
    label: "Settings"
    files:
      - label: "Navigation"
        name: "navigation"
        file: "_data/navigation.yml"
        fields:
          - label: "Main Navigation Options"
            name: "main"
            widget: "list"
            fields:
              - {label: "Title", name: "title", widget: "string"}
              - {label: "URL", name: "url", widget: "string"}
          - label: "Call to Action"
            name: "cta"
            widget: "object"
            fields:
              - {label: "Title", name: "title", widget: "string"}
              - {label: "URL", name: "url", widget: "string"}
      - label: "Footer"
        name: "footer"
        file: "_data/footer.yml"
        fields:
          - label: "Columns"
            name: "columns"
            widget: "list"
            fields:
              - {label: "Title", name: "title", widget: "string"}
              - label: "Links"
                name: "links"
                widget: "list"
                fields:
                  - {label: "Title", name: "title", widget: "string"}
                  - {label: "URL", name: "url", widget: "string"}
          - label: "Social Links"
            name: "social"
            widget: "list"
            fields:
              - {label: "Platform", name: "platform", widget: "string"}
              - {label: "URL", name: "url", widget: "string"}
          - label: "Legal Links"
            name: "legal"
            widget: "list"
            required: false
            fields:
              - {label: "Title", name: "title", widget: "string"}
              - {label: "File/URL", name: "url", widget: "file", required: false}
      - label: "Home Page Settings"
        name: "home_page"
        file: "_data/home.yml"
        fields:
          - label: "Hero Title"
            name: "hero_title"
            widget: "string"
          - label: "Features"
            name: "features"
            widget: "list"
            fields:
              - {label: "Title", name: "title", widget: "string"}
              - {label: "URL", name: "url", widget: "string"}
              - {label: "Class Context", name: "class", widget: "string"}